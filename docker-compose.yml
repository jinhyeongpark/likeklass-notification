version: '3.8'

services:
  # MySQL 8.0: 알림 데이터 및 Outbox 테이블 저장 (SKIP LOCKED 지원)
  mysql:
    image: mysql:8.0
    container_name: liveklass-mysql
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=notification
      - MYSQL_USER=user
      - MYSQL_PASSWORD=password
      - MYSQL_ROOT_PASSWORD=root_password
      - TZ=Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    networks:
      - liveklass-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

networks:
  liveklass-network:
    driver: bridge
